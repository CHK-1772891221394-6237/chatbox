<!DOCTYPE html>
<html>
<head>
<title>AI Academic Chatbot</title>

<style>

body{
font-family: Arial;
background-image: url("bgimage.jpg");
background-size: cover;
color:white;
}

.chat-container{
width:100%;
max-width:800px;
margin:auto;
height:90vh;
display:flex;
flex-direction:column;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:20px;
}

.user{
background:#0b93f6;
padding:10px;
border-radius:10px;
margin:10px 0;
align-self:flex-end;
width:fit-content;
}

.bot{
background:#444654;
padding:10px;
border-radius:10px;
margin:10px 0;
width:fit-content;
}

.input-area{
display:flex;
padding:10px;
background:#40414f;
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
background:#40414f;
color:white;
}

button{
padding:10px 20px;
border:none;
background:#19c37d;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="chat-box" id="chatBox"></div>

<div class="input-area">
<input type="text" id="message" placeholder="Ask something about college...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

function addMessage(text, className){
let chatBox = document.getElementById("chatBox");

let msg = document.createElement("div");
msg.className = className;
msg.innerText = text;

chatBox.appendChild(msg);
chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage(){

let message = document.getElementById("message").value;

addMessage(message,"user");

fetch("http://127.0.0.1:5000/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:message})
})
.then(res=>res.json())
.then(data=>{
addMessage(data.reply,"bot");
});

document.getElementById("message").value="";
}

</script>

</body>
</html>
